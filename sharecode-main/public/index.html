    #search-wrapper {
      position: relative;
    }

      top: 50%;

      top: 50%;
      transform: translateY(-50%);

      height: 28px;
      border-radius: 8px;
      border: none;
      background: #f1f5f9;

      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;

      opacity: 0;
      pointer-events: none;

      pointer-events: auto;

    #cards-grid .file-card.visible {

    #cards-grid .file-card.filtered-out {

    /* ══════════════════════════════════════════════
       HELPERS
    ══════════════════════════════════════════════ */
    const languageColors = {
      javascript:'#f7df1e', typescript:'#3178c6', html:'#e34f26', css:'#1572b6',
      scss:'#cc6699', less:'#1d365d', json:'#292929', python:'#3776ab',
      java:'#b07219', cpp:'#f34b7d', c:'#555555', go:'#00add8',
      rust:'#dea584', ruby:'#701516', php:'#4f5d95', swift:'#f05138',
      kotlin:'#7f52ff', sql:'#e38c00', bash:'#4eaa25', powershell:'#012456',
      markdown:'#083fa1', yaml:'#cb171e', toml:'#9c4221', lua:'#000080',
      dart:'#00b4ab', dockerfile:'#384d54', graphql:'#e10098', plaintext:'#6b7280',
    };

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }
    function formatSize(b) {
      if (!b) return '0 B';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }
    function formatDate(s) {
      if (!s) return '-';
      const d = new Date(s), now = new Date(), diff = now - d;
      if (diff < 60000) return 'Baru saja';
      if (diff < 3600000) return Math.floor(diff/60000) + ' menit lalu';
      if (diff < 86400000) return Math.floor(diff/3600000) + ' jam lalu';
      if (diff < 604800000) return Math.floor(diff/86400000) + ' hari lalu';
      return d.toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' });
    }
    function getFileIcon(name) {
      const ext = (name||'').split('.').pop()?.toLowerCase();
      const m = { js:'JS',mjs:'JS',cjs:'JS',ts:'TS',tsx:'TSX',jsx:'JSX',html:'</>',htm:'</>',css:'#',scss:'#',less:'#',json:'{}',py:'PY',pyw:'PY',java:'JV',cpp:'C++',cxx:'C++',cc:'C++',c:'C',h:'H',go:'GO',rs:'RS',rb:'RB',php:'PHP',swift:'SW',kt:'KT',kts:'KT',sql:'SQL',sh:'SH',bash:'SH',zsh:'SH',ps1:'PS',bat:'BAT',cmd:'CMD',md:'MD',mdx:'MD',xml:'<>',yaml:'Y',yml:'Y',toml:'T',ini:'INI',cfg:'CFG',env:'ENV',txt:'TX',log:'LOG',vue:'VUE',svelte:'SV',astro:'AST',lua:'LUA',r:'R',dart:'DRT',dockerfile:'DK',graphql:'GQ',gql:'GQ' };
      return m[ext] || (ext ? ext.toUpperCase().substring(0,2) : '??');
    }
    function getLangColor(l) { return languageColors[l] || '#6b7280'; }

    /* ══════════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════════ */
    function showToast(msg, type='success') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      const bg = type === 'success' ? 'bg-slate-800' : 'bg-red-600';
      const ic = type === 'success' ? 'text-emerald-400' : 'text-white';
      t.className = `toast-enter pointer-events-auto ${bg} text-white px-5 py-3 rounded-2xl text-sm font-semibold shadow-2xl flex items-center gap-3 max-w-sm`;
      t.innerHTML = `<span class="w-4 h-4 ${ic} flex-shrink-0">${type==='success'?SVG.check:SVG.dot}</span><span>${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => { t.classList.remove('toast-enter'); t.classList.add('toast-exit'); setTimeout(()=>t.remove(), 200); }, 2500);
    }

    async function copyToClipboard(text, msg) {
      try { await navigator.clipboard.writeText(text); showToast(msg); }
      catch { showToast('Gagal menyalin, coba lagi', 'error'); }
    }

    /* ══════════════════════════════════════════════
       SEARCH — operates only on DOM, no re-render
    ══════════════════════════════════════════════ */
    function applySearch(q) {
      searchQuery = q;
      const cards = document.querySelectorAll('#cards-grid .file-card');
      const empty = document.getElementById('empty-state');
      const meta  = document.getElementById('search-meta');
      const clearBtn = document.getElementById('clear-btn');
      const lq = q.toLowerCase().trim();
      let visibleCount = 0;

      cards.forEach(card => {
        const name = (card.dataset.name||'').toLowerCase();
        const lang = (card.dataset.lang||'').toLowerCase();
        const match = !lq || name.includes(lq) || lang.includes(lq);
        card.classList.toggle('filtered-out', !match);
        if (match) visibleCount++;
      });

      /* clear button visibility */
      if (clearBtn) clearBtn.classList.toggle('visible', lq.length > 0);

      /* result meta text */
      if (meta) {
        if (lq) {
          meta.innerHTML = `Menampilkan <span class="font-semibold text-slate-700">${visibleCount}</span> dari <span class="font-semibold text-slate-700">${allFiles.length}</span> file`;
          meta.style.opacity = '1';
        } else {
          meta.style.opacity = '0';
        }
      }

      /* empty state */
      if (empty) {
        const show = lq && visibleCount === 0;
        empty.classList.toggle('visible', show);
        if (show) {
          empty.querySelector('.empty-query').textContent = q;
        }
      }
    }

       NAVIGATION
    ══════════════════════════════════════════════ */
    function navigateTo(e, path) {
      e.preventDefault();
      window.history.pushState({}, '', path);
      handleRoute();
    }

    /* ══════════════════════════════════════════════

    ══════════════════════════════════════════════ */

    function showError(msg) {

            <div class="w-20 h-20 bg-slate-100 rounded-3xl flex items-center justify-center mx-auto mb-5">

            </div>
            <h2 class="text-xl font-bold text-slate-700 mb-2">Oops, tidak ditemukan</h2>
            <p class="text-slate-400 mb-6">${msg}</p>

              <span class="w-4 h-4">${SVG.arrowLeft}</span> Kembali ke Dashboard

              <div class="md:col-span-5">

                <p class="text-sm text-slate-500 leading-relaxed mb-6 max-w-sm">Platform modern penyedia kode yang dibutuhkan untuk project masa depan keren kamu.</p>

    /* ══════════════════════════════════════════════
       DASHBOARD — renders ONCE, search filters in-place
    ══════════════════════════════════════════════ */
    function renderDashboard(data) {
      allFiles = data.files;
      const total = data.total;
      const origin = window.location.origin;

      /* Build all cards HTML upfront (hidden initially) */
      const cardsHtml = allFiles.map(file => {
        const color   = getLangColor(file.language);
        const icon    = getFileIcon(file.name);
        const sizeStr = formatSize(file.size);
        const dateStr = formatDate(file.modified);
        const fileUrl = `${origin}/${encodeURIComponent(file.name)}`;
        return `
          <a href="/${encodeURIComponent(file.name)}"
             onclick="navigateTo(event,'/${encodeURIComponent(file.name)}')"
             class="file-card card-glow group bg-white border border-slate-200/80 rounded-2xl p-5 block cursor-pointer hover:border-brand-200/80"
             data-name="${escapeHtml(file.name)}"
             data-lang="${escapeHtml(file.language)}">
            <div class="flex items-start justify-between mb-4">
              <div class="flex items-center gap-3.5">
                <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-white text-xs font-bold shadow-md transition-transform group-hover:scale-110 flex-shrink-0"
                     style="background-color:${color};box-shadow:0 4px 12px ${color}30;">${icon}</div>
                <div class="min-w-0">
                  <h3 class="font-semibold text-slate-800 group-hover:text-brand-600 transition-colors truncate max-w-[180px] text-[15px]">${escapeHtml(file.name)}</h3>
                  <span class="text-xs text-slate-400 font-medium">${file.language}</span>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-4 text-xs text-slate-400 mb-3">
              <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5">${SVG.lines}</span> ${file.lines} baris</span>
              <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5">${SVG.database}</span> ${sizeStr}</span>
            </div>
            <div class="pt-3 border-t border-slate-100 flex items-center justify-between">
              <span class="flex items-center gap-1.5 text-xs text-slate-400"><span class="w-3 h-3">${SVG.clock}</span> ${dateStr}</span>
              <button onclick="event.preventDefault();event.stopPropagation();copyToClipboard('${fileUrl}','Link ${escapeHtml(file.name)} disalin!')"
                      class="flex items-center gap-1.5 text-xs text-slate-400 hover:text-brand-500 transition-colors font-medium px-2 py-1 rounded-lg hover:bg-brand-50">
                <span class="w-3.5 h-3.5">${SVG.link}</span> Salin
              </button>
            </div>
          </a>`;
      }).join('');

      document.getElementById('app').innerHTML = `
        <!-- ── Header ── -->
        <header class="bg-white border-b border-slate-200/80">
          <div class="max-w-6xl mx-auto px-6 py-10">
            <div class="flex items-center gap-3 mb-3">
              <a href="https://github.com/${GITHUB_USERNAME}/${REPO_NAME}" target="_blank"
                 class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-full px-4 py-2 hover:bg-slate-100 transition-colors">
                <span class="w-4 h-4 text-slate-600">${SVG.github}</span>
                <span class="text-sm font-semibold text-slate-700">${GITHUB_USERNAME}/${REPO_NAME}</span>
              </a>
            </div>
            <h1 class="text-[2.5rem] font-extrabold text-slate-900 leading-tight mb-2" style="font-family:'Clash Display','Plus Jakarta Sans',sans-serif;">
              Share<span class="gradient-text">Code</span>
            </h1>
            <p class="text-slate-500 text-lg">Cari kode yang kamu inginkan dengan mudah hanya disini</p>
            <div class="flex items-center gap-5 mt-5">
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse-soft"></span>
                <span class="text-sm text-slate-600 font-semibold">${total} file tersedia</span>
              </div>
            </div>
          </div>
        </header>

        <!-- ── Search bar (sticky, doesn't re-render) ── -->
        <div class="sticky top-0 z-20 bg-[#fafbfc]/95 backdrop-blur-sm border-b border-slate-100/80 py-4">
          <div class="max-w-6xl mx-auto px-6">
            <div id="search-wrapper" class="relative">
              <span id="search-icon" class="pointer-events-none">${SVG.search}</span>
              <input
                type="text"
                id="searchInput"
                placeholder="Cari file atau bahasa… (contoh: spotify, python, js)"
                autocomplete="off"
                spellcheck="false"
              />
              <button id="clear-btn" aria-label="Hapus pencarian" title="Hapus pencarian">
                <span style="width:14px;height:14px;display:flex">${SVG.x}</span>
              </button>
            </div>
            <p id="search-meta" class="text-xs text-slate-400 font-medium" style="opacity:0;height:24px;margin-top:8px;transition:opacity .2s;"></p>
          </div>
        </div>

        <!-- ── Cards grid ── -->
        <main class="max-w-6xl mx-auto px-6 py-8 w-full flex-1">
          <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${cardsHtml}
            <!-- Empty state (hidden by default) -->
            <div id="empty-state" class="col-span-full flex-col items-center justify-center py-20 text-center">
              <div class="w-24 h-24 bg-brand-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <span class="w-12 h-12 text-brand-400">${SVG.search}</span>
              </div>
              <h3 class="text-xl font-bold text-slate-700 mb-2">Tidak ada hasil</h3>
              <p class="text-slate-400 max-w-md mx-auto">
                Tidak ada file yang cocok dengan "<span class="empty-query font-semibold text-slate-600"></span>"
              </p>
              <button onclick="clearSearch()" class="mt-4 inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-brand-500 hover:text-brand-600 transition-colors">
                <span class="w-4 h-4">${SVG.x}</span> Hapus pencarian
              </button>
            </div>
          </div>
        </main>

        ${renderFooter()}
      `;

      document.title = `ShareCode — ${GITHUB_USERNAME}/${REPO_NAME}`;

      /* Staggered entrance animation for cards */
      requestAnimationFrame(() => {
        document.querySelectorAll('#cards-grid .file-card').forEach((card, i) => {
          card.style.transition = `opacity 0.35s ease ${i * 40}ms, transform 0.35s ease ${i * 40}ms`;
          requestAnimationFrame(() => card.classList.add('visible'));
        });
      });

      /* Wire up search input — single event listener, no re-render */
      const input = document.getElementById('searchInput');
      const clearBtn = document.getElementById('clear-btn');

      input.addEventListener('input', () => applySearch(input.value));
      clearBtn.addEventListener('click', () => clearSearch());

      /* Restore query if navigating back */
      if (searchQuery) {
        input.value = searchQuery;
        applySearch(searchQuery);
      }
    }

    function clearSearch() {
      const input = document.getElementById('searchInput');
      if (input) {
        input.value = '';
        input.focus();
        applySearch('');
      }
    }

    /* ══════════════════════════════════════════════
       DETAIL PAGE
    ══════════════════════════════════════════════ */

                  <div class="min-w-0">
                    <h1 class="font-bold text-slate-800 text-lg truncate">${escapeHtml(file.filename)}</h1>
                    <div class="flex items-center gap-2.5 text-xs text-slate-400 font-medium">

                      <span class="w-1 h-1 bg-slate-300 rounded-full"></span>

                  <span class="w-4 h-4">${SVG.link}</span> Bagikan

              </div>

          </div>
        </div>

            <div class="flex items-center justify-between px-5 py-3 code-header-gradient border-b border-slate-200/80">
              <div class="flex items-center gap-3">
                <div class="flex gap-1.5">
                  <div class="w-3 h-3 rounded-full bg-red-400/80"></div>
                  <div class="w-3 h-3 rounded-full bg-amber-400/80"></div>
                  <div class="w-3 h-3 rounded-full bg-emerald-400/80"></div>
                </div>
                <span class="text-xs text-slate-400 font-mono ml-2">${escapeHtml(file.filename)}</span>
              </div>
              <span class="text-xs text-slate-400 font-medium">${file.language}</span>
            </div>
            <pre class="!bg-white !m-0 !p-5 overflow-x-auto"><code class="language-${file.language} !bg-white text-sm font-mono leading-relaxed">${escaped}</code></pre>
          </div>
          <div class="mt-4 flex items-center justify-between text-xs text-slate-400 font-medium pb-6">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3">${SVG.clock}</span> Terakhir diubah: ${dateStr}</span>
            <a href="https://github.com/${GITHUB_USERNAME}/${REPO_NAME}" target="_blank"
               class="text-brand-500 hover:text-brand-600 font-semibold flex items-center gap-1.5">

      document.title = `${file.filename} — ShareCode`;
      setTimeout(() => document.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)), 100);
    }

    /* ══════════════════════════════════════════════
       ROUTER
    ══════════════════════════════════════════════ */
    function handleRoute() {
      const path = window.location.pathname;
      if (path === '/' || path === '') {
        currentView = 'dashboard';
        loadDashboard();
      } else {
        const filename = decodeURIComponent(path.substring(1));
        if (filename) { currentView = 'detail'; loadDetail(filename); }
        else { currentView = 'dashboard'; loadDashboard(); }
      }
    }

    async function loadDashboard() {
      showLoading();
      try {
        const res = await fetch(API_BASE);
        const data = await res.json();
        if (data.success) renderDashboard(data);
        else showError('Gagal memuat daftar file');
      } catch { showError('Server tidak tersedia, coba lagi nanti'); }
    }

    async function loadDetail(filename) {
      showLoading();
      try {
        const res = await fetch(`${API_BASE}/${encodeURIComponent(filename)}`);
        const data = await res.json();
        if (data.success) renderDetail(data.file);
        else showError('File tidak ditemukan di folder src/');
      } catch { showError('Server tidak tersedia, coba lagi nanti'); }
    }

    window.addEventListener('popstate', handleRoute);
    handleRoute();
  </script>
